# ── Upstream: PM2 cluster workers all on port 5000 ───────────────────────────
# Nginx distributes requests across them using round-robin by default
upstream golden_skills_api {
    least_conn;                    # send to worker with fewest active connections
    server 127.0.0.1:5000;
    keepalive 64;                  # keep 64 persistent connections to upstream
}

# ── HTTP server ───────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name localhost;         # change to your domain in production

    # ── Compression ──────────────────────────────────────────────────────────
    gzip on;
    gzip_types application/json text/plain;
    gzip_min_length 1000;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;

    # ── API proxy ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://golden_skills_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # ── React frontend (production build) ─────────────────────────────────────
    location / {
        root   /path/to/Golden skills/dist;   # update this path
        index  index.html;
        try_files $uri $uri/ /index.html;     # SPA fallback
    }
}
